<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Slipstream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0a0f;
      position: relative;
    }
    /* Let Phaser ScaleManager center the canvas — flex here fights FIT + autoCenter and can shift content sideways. */
    #game-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    canvas { display: block; touch-action: none; margin: 0; }
  </style>
</head>
<body>
  <!-- Production: deploy only the `dist/` folder after `npm run build` (not this file as-is). -->
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
